<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메뉴 수정 · 카페 관리자</title>
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="edit.css">
</head>
<body>
  <header class="admin-header">
    <h1>☕ 카페 관리자</h1>
    <nav>
      <a href="../index.html">대시보드</a>
      <a href="list.html" class="active">메뉴 관리</a>
      <a href="../orders/list.html">주문 관리</a>
    </nav>
  </header>

  <main class="page">
    <a class="back-link" href="list.html">← 메뉴 목록</a>

    <form id="menu-form" class="form-card" hidden>
      <h2>메뉴 수정</h2>

      <label class="field">
        <span>이름</span>
        <input type="text" id="f-name" required>
      </label>

      <label class="field">
        <span>카테고리</span>
        <select id="f-category" required></select>
      </label>

      <label class="field">
        <span>가격</span>
        <input type="number" id="f-price" min="0" step="100" required>
      </label>

      <label class="field">
        <span>설명</span>
        <textarea id="f-description" rows="3"></textarea>
      </label>

      <div class="form-actions">
        <a class="btn btn-ghost" href="list.html">취소</a>
        <button type="submit" class="btn btn-primary">저장하기</button>
      </div>
    </form>

    <p id="not-found" class="empty-state" hidden>메뉴를 찾을 수 없습니다.</p>
  </main>

  <script src="../../js/data.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="edit.js"></script>
</body>
</html>
