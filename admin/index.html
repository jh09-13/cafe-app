<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 · 카페 관리자</title>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="index.css">
</head>
<body>
  <header class="admin-header">
    <h1>☕ 카페 관리자</h1>
    <nav>
      <a href="index.html" class="active">대시보드</a>
      <a href="menus/list.html">메뉴 관리</a>
      <a href="orders/list.html">주문 관리</a>
    </nav>
  </header>

  <main class="page">
    <h2>대시보드</h2>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">전체 메뉴</span>
        <span id="stat-menus" class="stat-value">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">전체 주문</span>
        <span id="stat-orders" class="stat-value">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">대기중 주문</span>
        <span id="stat-pending" class="stat-value">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">총 매출</span>
        <span id="stat-revenue" class="stat-value">0원</span>
      </div>
    </div>

    <div class="section-head">
      <h3>최근 주문</h3>
      <a class="link-more" href="orders/list.html">전체보기 →</a>
    </div>

    <table class="order-table">
      <thead>
        <tr>
          <th>일시</th>
          <th>메뉴</th>
          <th>금액</th>
          <th>상태</th>
          <th class="col-actions">관리</th>
        </tr>
      </thead>
      <tbody id="recent-orders-body"></tbody>
    </table>

    <p id="empty-state" class="empty-state" hidden>주문 내역이 없습니다.</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="index.js"></script>
</body>
</html>
